<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo favicon - escenario</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Icono de un escenario con cortinas y luces para favicon</desc>

  

  <defs>
    <radialGradient id="spotlight1" cx="40%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotlight2" cx="60%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorgrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#5a3e1b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2a1e0e" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Fondo oscuro del escenario -->
